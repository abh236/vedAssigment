services:
  # ── Backend (Node.js Web Service) ─────────────────────────────────────────
  - type: web
    name: vedaai-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false          # set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false          # set to your Vercel URL
      - key: REDIS_URL
        sync: false          # optional

  # ── Frontend (Static Site) ─────────────────────────────────────────────────
  - type: web
    name: vedaai-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false          # set to your Render backend URL
      - key: NEXT_PUBLIC_WS_URL
        sync: false
